name: Build frontend and update backend/public

on:
  push:

jobs:
  build-and-copy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Clear backend/public
        run: rm -rf backend/public/*

      - name: Copy frontend build to backend/public
        run: cp -r frontend/dist/. backend/public/

      - name: Commit and push built assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/public
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update frontend build assets"
            git push
          fi
